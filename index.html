<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martian Manager | Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="assets/logo.png?v=2" type="image/png">
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="login-container">
        <div class="glass-panel login-box">
            <img src="assets/logo.png" alt="Marte Studios Logo" class="login-logo" style="width: 80px; height: auto;">
            
            <h1 class="title-glow">Martian Manager</h1>
            <p class="subtitle">Internal Access Only</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Username o Work Email</label>
                    <input type="text" id="email" placeholder="m.rossi o nome@martestudios.com" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Access Key</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="input-group" style="display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem;">
                    <input type="checkbox" id="remember" style="width: auto; padding: 0;">
                    <label for="remember" style="margin: 0; display: inline; cursor: pointer;">Stay connected to module</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Initialize Link</button>
            </form>
            
            <div style="margin-top: 2rem; font-size: 0.85rem; color: var(--text-muted);">
                <p>Non hai un account? <a href="register.html" style="color: var(--accent); font-weight: bold; text-decoration: none;">Iscriviti al Portale</a></p>
                <p style="margin-top: 1rem;">Simulazione Base: Prova con <strong>g.brancato@martestudios.com</strong> (Admin) o <strong>intern@martestudios.com</strong> (Tirocinante)</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
